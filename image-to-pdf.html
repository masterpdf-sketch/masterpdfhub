        <div class="card">
            <h1><i class="fas fa-image"></i> Image to PDF Converter</h1>
            <p>Convert your JPG or PNG images into a PDF document instantly. Free and secure.</p>
            
            <div class="tool-area">
                <input type="file" id="imageInput" accept="image/jpeg,image/png,image/jpg">
                <div class="preview" id="preview"></div>
                <button id="convertBtn"><i class="fas fa-download"></i> Convert to PDF</button>
            </div>
        </div>

        <div class="footer">
            <p>©️ 2025 Master PDF Hub — Free PDF Tools</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const input = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');
        let selectedImage = null;

        input.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImage = event.target.result;
                    preview.innerHTML = `<img src="${selectedImage}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });

        convertBtn.addEventListener('click', function() {
            if (!selectedImage) {
                alert('Please select an image first');
                return;
            }
            const { jsPDF } = window.jspdf;
            const img = new Image();
            img.onload = function() {
                const doc = new jsPDF();
                const imgWidth = 180;
                const imgHeight = (img.height * imgWidth) / img.width;
                doc.addImage(selectedImage, 'JPEG', 10, 10, imgWidth, imgHeight);
                doc.save('image_to_pdf.pdf');
            };
            img.src = selectedImage;
        });
    </script>
</body>
