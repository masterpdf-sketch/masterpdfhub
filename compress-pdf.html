<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF | Reduce PDF File Size Online Free - Master PDF Hub</title>
<meta name="description" content="Compress PDF files online for free. Reduce PDF size without losing quality. 100% secure, no upload, works in browser.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .redirect-card {
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            margin: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .icon { font-size: 4rem; color: #fbbf24; margin-bottom: 1rem; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { margin-bottom: 2rem; color: #e2e8f0; }
        .btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .loading { margin-top: 1rem; font-size: 0.8rem; color: #94a3b8; }
        .footer { margin-top: 2rem; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>
</div>
    <div class="redirect-card">
        <div class="icon"><i class="fas fa-compress-alt"></i></div>
        <h1>Compress PDF</h1>
        <p>You are being redirected to our trusted partner <strong>iLovePDF</strong> for professional PDF compression.</p>
        <a href="https://www.ilovepdf.com/compress_pdf" target="_blank" class="btn" id="redirectBtn">
            <i class="fas fa-external-link-alt"></i> Open Compress PDF
        </a>
        <div class="loading">Redirecting in <span id="countdown">5</span> seconds...</div>
        <div class="footer">🔒 Secure & Free • No file upload to our servers</div>
    </div>

    <script>
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        const redirectBtn = document.getElementById('redirectBtn');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = 'https://www.ilovepdf.com/compress_pdf';
            }
        }, 1000);
        
        redirectBtn.addEventListener('click', () => clearInterval(timer));
    </script>
</body>
</html>
