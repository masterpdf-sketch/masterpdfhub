<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF - Master PDF Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: bold; }
        .logo i { font-size: 2rem; color: #fbbf24; }
        .nav-links a { color: #e2e8f0; text-decoration: none; margin-left: 1.5rem; transition: color 0.2s; }
        .nav-links a:hover { color: #fbbf24; }
        .card { background: rgba(20, 25, 45, 0.7); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        .tool-area { margin: 2rem 0; text-align: center; }
        input[type="file"] { background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); color: white; width: 100%; margin-bottom: 1rem; }
        .quality-slider { margin: 1rem 0; }
        .quality-slider label { display: block; margin-bottom: 0.5rem; }
        input[type="range"] { width: 100%; accent-color: #fbbf24; }
        button { background: linear-gradient(135deg, #fbbf24, #f59e0b); border: none; color: white; font-weight: 600; padding: 12px 28px; border-radius: 40px; cursor: pointer; margin-top: 1rem; }
        .result { margin-top: 1rem; padding: 1rem; background: rgba(16,185,129,0.2); border-radius: 1rem; display: none; }
        .footer { text-align: center; margin-top: 3rem; padding: 2rem; border-top: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        @media (max-width: 768px) { .container { padding: 1rem; } .nav-links a { margin-left: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-file-pdf"></i>
                <span>Master PDF Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="text-to-pdf.html">Text to PDF</a>
                <a href="image-to-pdf.html">Image to PDF</a>
                <a href="merge-pdf.html">Merge PDF</a>
                <a href="compress-pdf.html">Compress PDF</a>
            </div>
        </div>

        <div class="card">
            <h1><i class="fas fa-compress-alt"></i> Compress PDF</h1>
            <p>Reduce PDF file size while maintaining quality. Free and secure.</p>
            
            <div class="tool-area">
                <input type="file" id="pdfInput" accept="application/pdf">
                <div class="quality-slider">
                    <label>Compression Quality: <span id="qualityValue">70</span>%</label>
                    <input type="range" id="quality" min="20" max="100" value="70">
                    <p style="font-size: 0.8rem; margin-top: 0.3rem;">Lower quality = smaller file size</p>
                </div>
                <button id="compressBtn"><i class="fas fa-compress-alt"></i> Compress PDF</button>
                <div id="result" class="result"></div>
            </div>
        </div>

        <div class="footer">
            <p>©️ 2025 Master PDF Hub — Free PDF Tools</p>
        </div>
    </div>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script>
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        qualitySlider.addEventListener('input', function() {
            qualityValue.innerText = this.value;
        });

        document.getElementById('compressBtn').addEventListener('click', async function() {
            const file = document.getElementById('pdfInput').files[0];
            if (!file) {
                alert('Please select a PDF file');
                return;
            }

            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Compressing...';
            btn.disabled = true;

            try {
                const { PDFDocument } = window.PDFLib;
                const bytes = await file.arrayBuffer();
                const pdf = await PDFDocument.load(bytes);
                
                const compressedBytes = await pdf.save({ useObjectStreams: true });
                
                const originalSize = (file.size / 1024).toFixed(2);
                const compressedSize = (compressedBytes.byteLength / 1024).toFixed(2);
                const saved = (originalSize - compressedSize).toFixed(2);
                const savedPercent = ((1 - compressedBytes.byteLength / file.size) * 100).toFixed(1);
                
                const blob = new Blob([compressedBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `compressed_${file.name}`;
                a.click();
                URL.revokeObjectURL(url);
                
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <i class="fas fa-check-circle" style="color: #10b981;"></i>
                    <strong>Compressed!</strong><br>
                    Original: ${originalSize} KB | Compressed: ${compressedSize} KB<br>
                    Saved: ${saved} KB (${savedPercent}%)
                `;
            } catch (error) {
                alert('Error compressing PDF: ' + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
