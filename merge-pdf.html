<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF Files | Combine PDFs Online Free - Master PDF Hub</title>
<meta name="description" content="Merge multiple PDF files into one document online. Free PDF merger, no upload, secure. Combine PDFs easily with our tool.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: bold; }
        .logo i { font-size: 2rem; color: #34d399; }
        .nav-links a { color: #e2e8f0; text-decoration: none; margin-left: 1.5rem; transition: color 0.2s; }
        .nav-links a:hover { color: #34d399; }
        .card { background: rgba(20, 25, 45, 0.7); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        .tool-area { margin: 2rem 0; text-align: center; }
        input[type="file"] { background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); color: white; width: 100%; margin-bottom: 1rem; }
        button { background: linear-gradient(135deg, #34d399, #10b981); border: none; color: white; font-weight: 600; padding: 12px 28px; border-radius: 40px; cursor: pointer; margin-top: 1rem; }
        .file-list { margin-top: 1rem; text-align: left; }
        .file-item { background: rgba(255,255,255,0.1); padding: 0.5rem; margin: 0.3rem 0; border-radius: 0.5rem; }
        .footer { text-align: center; margin-top: 3rem; padding: 2rem; border-top: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        @media (max-width: 768px) { .container { padding: 1rem; } .nav-links a { margin-left: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-file-pdf"></i>
                <span>Master PDF Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="text-to-pdf.html">Text to PDF</a>
                <a href="image-to-pdf.html">Image to PDF</a>
                <a href="merge-pdf.html">Merge PDF</a>
                <a href="compress-pdf.html">Compress PDF</a>
            </div>
        </div>

        <div class="card">
            <h1><i class="fas fa-object-group"></i> Merge PDF Files</h1>
            <p>Combine multiple PDF files into one document. Free and easy to use.</p>
            
            <div class="tool-area">
                <input type="file" id="pdfInput" multiple accept="application/pdf">
                <div id="fileList" class="file-list"></div>
                <button id="mergeBtn"><i class="fas fa-download"></i> Merge & Download</button>
            </div>
        </div>

        <div class="footer">
            <p>©️ 2025 Master PDF Hub — Free PDF Tools</p>
        </div>
    </div>

    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script>
        const input = document.getElementById('pdfInput');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        let selectedFiles = [];

        input.addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            fileList.innerHTML = selectedFiles.map(f => `<div class="file-item"><i class="fas fa-file-pdf"></i> ${f.name}</div>`).join('');
        });

        mergeBtn.addEventListener('click', async function() {
            if (selectedFiles.length < 2) {
                alert('Please select at least 2 PDF files to merge');
                return;
            }

            mergeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Merging...';
            mergeBtn.disabled = true;

            try {
                const { PDFDocument } = window.PDFLib;
                const mergedPdf = await PDFDocument.create();
                
                for (const file of selectedFiles) {
                    const bytes = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(bytes);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(page => mergedPdf.addPage(page));
                }
                
                const mergedBytes = await mergedPdf.save();
                const blob = new Blob([mergedBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'merged.pdf';
                a.click();
                URL.revokeObjectURL(url);
                
                alert('✅ PDFs merged successfully!');
            } catch (error) {
                alert('Error merging PDFs: ' + error.message);
            } finally {
                mergeBtn.innerHTML = '<i class="fas fa-download"></i> Merge & Download';
                mergeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
