<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to PDF - Master PDF Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: bold; }
        .logo i { font-size: 2rem; color: #60a5fa; }
        .nav-links a { color: #e2e8f0; text-decoration: none; margin-left: 1.5rem; transition: color 0.2s; }
        .nav-links a:hover { color: #60a5fa; }
        .card { background: rgba(20, 25, 45, 0.7); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        .tool-area { margin: 2rem 0; }
        textarea { width: 100%; padding: 1rem; border-radius: 1rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 1rem; }
        button { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; color: white; font-weight: 600; padding: 12px 28px; border-radius: 40px; cursor: pointer; margin-top: 1rem; }
        .footer { text-align: center; margin-top: 3rem; padding: 2rem; border-top: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        @media (max-width: 768px) { .container { padding: 1rem; } .nav-links a { margin-left: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-file-pdf"></i>
                <span>Master PDF Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="text-to-pdf.html">Text to PDF</a>
                <a href="image-to-pdf.html">Image to PDF</a>
                <a href="merge-pdf.html">Merge PDF</a>
                <a href="compress-pdf.html">Compress PDF</a>
            </div>
        </div>

        <div class="card">
            <h1><i class="fas fa-file-alt"></i> Text to PDF Converter</h1>
            <p>Convert your text into a professional PDF instantly. Fast, secure, and free.</p>
            
            <div class="tool-area">
                <textarea id="textInput" rows="10" placeholder="Enter your text here..."></textarea>
                <button id="convertBtn"><i class="fas fa-download"></i> Convert to PDF</button>
            </div>
        </div>

        <div class="footer">
            <p>©️ 2025 Master PDF Hub — Free PDF Tools</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        document.getElementById('convertBtn').addEventListener('click', function() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) {
                alert('Please enter some text');
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(text, 10, 10, { maxWidth: 180 });
            doc.save('text_to_pdf.pdf');
        });
    </script>
</body>
</html>
