<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Text to PDF | Inline Image Editor - Master PDF Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            color: white;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; }
        h1 i { color: #60a5fa; margin-right: 0.5rem; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.9rem; }
        
        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            justify-content: center;
        }
        .tool-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 0.5rem 0.9rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: white;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(96,165,250,0.6); }
        .plus-btn {
            background: rgba(16,185,129,0.3);
            border: 1px dashed rgba(16,185,129,0.6);
        }
        .plus-btn:hover { background: rgba(16,185,129,0.6); }
        
        /* Editor */
        .editor-area {
            background: white;
            color: #1a2a4a;
            min-height: 500px;
            border-radius: 0.8rem;
            padding: 1.5rem;
            margin: 1rem 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
            line-height: 1.6;
            overflow-y: auto;
        }
        .editor-area:focus { outline: none; }
        .editor-area img {
            max-width: 100%;
            max-height: 250px;
            margin: 10px 0;
            display: block;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .generate-btn:hover { transform: scale(1.02); }
        
        .footer { text-align: center; margin-top: 2rem; padding: 1rem; font-size: 0.7rem; color: #64748b; }
        .back-btn {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            background: rgba(59,130,246,0.8);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
            z-index: 100;
        }
        .back-btn:hover { background: #3b82f6; transform: scale(1.05); }
        
        .hidden-pdf {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 210mm;
            background: white;
            padding: 1mm;
            font-family: 'Times New Roman', Times, serif;
        }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .container { padding: 1rem; }
            .editor-area { min-height: 350px; padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-edit"></i> Text + Image Editor</h1>
    <p class="subtitle">Click <strong>➕ Add Image</strong> → image will insert at cursor position</p>
    
    <div class="toolbar">
        <button class="tool-btn" id="boldBtn"><i class="fas fa-bold"></i> Bold</button>
        <button class="tool-btn" id="italicBtn"><i class="fas fa-italic"></i> Italic</button>
        <button class="tool-btn" id="underlineBtn"><i class="fas fa-underline"></i> Underline</button>
        <button class="tool-btn plus-btn" id="addImageBtn"><i class="fas fa-plus-circle"></i> ➕ Add Image</button>
    </div>
    
    <!-- Editable Area -->
    <div id="editor" class="editor-area" contenteditable="true">
    </div>
    <button class="generate-btn" id="generateBtn"><i class="fas fa-file-pdf"></i> Generate PDF</button>
</div>

<div class="footer">
    <p>©️ 2026 Master PDF Hub — Free PDF & Image Tools</p>
</div>

<a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

<!-- Hidden PDF container -->
<div id="hiddenPdf" class="hidden-pdf">
    <div id="pdfContent"></div>
</div>

<script>
    // Toolbar formatting
    function applyFormat(command, value = null) {
        document.getElementById('editor').focus();
        document.execCommand(command, false, value);
    }
    
    document.getElementById('boldBtn').addEventListener('click', () => applyFormat('bold'));
    document.getElementById('italicBtn').addEventListener('click', () => applyFormat('italic'));
    document.getElementById('underlineBtn').addEventListener('click', () => applyFormat('underline'));
    
    // Add Image at cursor position
    const imageInput = document.createElement('input');
    imageInput.type = 'file';
    imageInput.accept = 'image/jpeg,image/png,image/jpg';
    
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.type.match('image.*')) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.createElement('img');
                img.src = event.target.result;
                img.style.maxWidth = '100%';
                img.style.maxHeight = '250px';
                img.style.borderRadius = '8px';
                img.style.margin = '10px 0';
                
                // Insert image at cursor position
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(img);
                    range.collapse(false);
                    
                    // Add a line break after image
                    const br = document.createElement('br');
                    range.insertNode(br);
                    range.collapse(false);
                } else {
                    document.getElementById('editor').appendChild(img);
                }
                
                document.getElementById('editor').focus();
            };
            reader.readAsDataURL(file);
        }
        imageInput.value = '';
    });
    
    document.getElementById('addImageBtn').addEventListener('click', () => {
        imageInput.click();
    });
    
    // Generate PDF
    document.getElementById('generateBtn').addEventListener('click', async () => {
        const editor = document.getElementById('editor');
        const pdfContent = document.getElementById('pdfContent');
        
        // Copy editor content to hidden div
        pdfContent.innerHTML = editor.innerHTML;
        
        // Apply A4 styles
        pdfContent.style.fontFamily = "'Times New Roman', Times, serif";
        pdfContent.style.fontSize = '16px';
        pdfContent.style.lineHeight = '1.6';
        pdfContent.style.color = '#111';
        pdfContent.style.maxWidth = '100%';
        
        // Images should be responsive
        const images = pdfContent.querySelectorAll('img');
        images.forEach(img => {
            img.style.maxWidth = '100%';
            img.style.height = 'auto';
            img.style.borderRadius = '8px';
            img.style.margin = '10px 0';
        });
        
        const btn = document.getElementById('generateBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';
        btn.disabled = true;
        
        const element = document.getElementById('hiddenPdf');
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: 'my_document.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        
        try {
            await html2pdf().set(opt).from(element).save();
            alert('✅ PDF generated successfully!');
        } catch (err) {
            alert('Error: ' + err.message);
        } finally {
            btn.innerHTML = '<i class="fas fa-file-pdf"></i> Generate PDF';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
