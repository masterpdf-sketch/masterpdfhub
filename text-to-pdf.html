<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Text to PDF | Text + Images Editor - Master PDF Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            color: white;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; }
        h1 i { color: #60a5fa; margin-right: 0.5rem; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.9rem; }
        
        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            justify-content: center;
        }
        .tool-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: white;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(96,165,250,0.6); }
        .color-picker { width: 35px; height: 32px; border-radius: 0.5rem; background: transparent; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }
        
        /* Editor Area - A4 style */
        .editor-area {
            background: white;
            color: #1a2a4a;
            min-height: 600px;
            border-radius: 0.5rem;
            padding: 2rem;
            margin: 1rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .editor-area:focus { outline: none; }
        
        /* Image Add Button */
        .image-add-btn {
            background: rgba(96,165,250,0.2);
            border: 2px dashed rgba(96,165,250,0.5);
            border-radius: 0.8rem;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            margin: 0.5rem 0;
            transition: all 0.2s;
        }
        .image-add-btn:hover { background: rgba(96,165,250,0.3); }
        
        .image-container {
            position: relative;
            display: inline-block;
            margin: 0.5rem 0;
        }
        .image-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 0.5rem;
        }
        .remove-img-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: rgba(239,68,68,0.9);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }
        
        .generate-btn {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .generate-btn:hover { transform: scale(1.02); }
        
        .footer { text-align: center; margin-top: 2rem; padding: 1rem; font-size: 0.7rem; color: #64748b; }
        .back-btn {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            background: rgba(59,130,246,0.8);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #3b82f6; transform: scale(1.05); }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .container { padding: 1rem; }
            .editor-area { padding: 1rem; min-height: 400px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-edit"></i> Text + Image Editor</h1>
    <p class="subtitle">Write text, add images anywhere, then convert to PDF</p>
    
    <!-- Toolbar -->
    <div class="toolbar">
        <button class="tool-btn" id="boldBtn"><i class="fas fa-bold"></i> Bold</button>
        <button class="tool-btn" id="italicBtn"><i class="fas fa-italic"></i> Italic</button>
        <button class="tool-btn" id="underlineBtn"><i class="fas fa-underline"></i> Underline</button>
        <input type="color" id="colorPicker" class="color-picker" value="#000000">
        <button class="tool-btn" id="alignLeftBtn"><i class="fas fa-align-left"></i></button>
        <button class="tool-btn" id="alignCenterBtn"><i class="fas fa-align-center"></i></button>
        <button class="tool-btn" id="alignRightBtn"><i class="fas fa-align-right"></i></button>
    </div>
    
    <!-- Editor Area - A4 Style White Box -->
    <div id="editor" class="editor-area" contenteditable="true">
        <b>Human Skull</b><br><br>
        The human skull is the bony structure that forms the head. It protects the brain and supports the face.
    </div>
    
    <!-- Add Image Button -->
    <div class="image-add-btn" id="addImageBtn">
        <i class="fas fa-plus-circle"></i> Add Image (JPG, PNG)
    </div>
    
    <!-- Hidden File Input -->
    <input type="file" id="imageInput" accept="image/jpeg,image/png,image/jpg" style="display:none;">
    
    <button class="generate-btn" id="generateBtn"><i class="fas fa-file-pdf"></i> Generate PDF</button>
</div>

<div class="footer">
    <p>©️ 2026 Master PDF Hub — Free PDF & Image Tools</p>
</div>

<a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

<script>
    // Toolbar Formatting Functions
    function applyFormat(command, value = null) {
        document.getElementById('editor').focus();
        document.execCommand(command, false, value);
    }
    
    document.getElementById('boldBtn').addEventListener('click', () => applyFormat('bold'));
    document.getElementById('italicBtn').addEventListener('click', () => applyFormat('italic'));
    document.getElementById('underlineBtn').addEventListener('click', () => applyFormat('underline'));
    document.getElementById('colorPicker').addEventListener('input', (e) => applyFormat('foreColor', e.target.value));
    document.getElementById('alignLeftBtn').addEventListener('click', () => applyFormat('justifyLeft'));
    document.getElementById('alignCenterBtn').addEventListener('click', () => applyFormat('justifyCenter'));
    document.getElementById('alignRightBtn').addEventListener('click', () => applyFormat('justifyRight'));
    
    // Image handling
    const imageInput = document.getElementById('imageInput');
    const editor = document.getElementById('editor');
    const addImageBtn = document.getElementById('addImageBtn');
    let currentImageElement = null;
    
    addImageBtn.addEventListener('click', () => {
        imageInput.click();
    });
    
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                // Create image container
                const container = document.createElement('div');
                container.className = 'image-container';
                container.setAttribute('contenteditable', 'false');
                
                const img = document.createElement('img');
                img.src = event.target.result;
                img.style.maxWidth = '100%';
                img.style.maxHeight = '300px';
                
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '✖';
                removeBtn.className = 'remove-img-btn';
                removeBtn.onclick = function() {
                    container.remove();
                };
                
                container.appendChild(img);
                container.appendChild(removeBtn);
                
                // Insert image at cursor position or at end
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(container);
                    range.collapse(false);
                } else {
                    editor.appendChild(container);
                }
                
                // Add line break after image
                const br = document.createElement('br');
                editor.appendChild(br);
                
                // Focus back to editor
                editor.focus();
            };
            reader.readAsDataURL(file);
        }
        imageInput.value = '';
    });
    
    // Generate PDF
    document.getElementById('generateBtn').addEventListener('click', async () => {
        const btn = document.getElementById('generateBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating PDF...';
        btn.disabled = true;
        
        // Temporarily remove contenteditable for rendering
        editor.removeAttribute('contenteditable');
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
            unit: 'mm',
            format: 'a4'
        });
        
        // Use html2canvas to capture editor content
        const canvas = await html2canvas(editor, {
            scale: 2,
            backgroundColor: '#ffffff',
            logging: false
        });
        
        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        const imgWidth = 190; // A4 width in mm with margins
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        
        pdf.addImage(imgData, 'JPEG', 10, 10, imgWidth, imgHeight);
        pdf.save('my_document.pdf');
        
        // Restore contenteditable
        editor.setAttribute('contenteditable', 'true');
        
        alert('✅ PDF generated successfully!');
        btn.innerHTML = '<i class="fas fa-file-pdf"></i> Generate PDF';
        btn.disabled = false;
    });
    
    // Load html2canvas if not already loaded
    if (typeof html2canvas === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        document.head.appendChild(script);
    }
</script>
</body>
</html>
