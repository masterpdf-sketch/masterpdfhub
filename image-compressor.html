<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - Master PDF Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: bold; }
        .logo i { font-size: 2rem; color: #10b981; }
        .nav-links a { color: #e2e8f0; text-decoration: none; margin-left: 1.5rem; transition: color 0.2s; }
        .nav-links a:hover { color: #10b981; }
        .card { background: rgba(20, 25, 45, 0.7); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 2rem; border: 1px solid rgba(255,255,255,0.2); }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        .tool-area { margin: 2rem 0; text-align: center; }
        input[type="file"] { background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2); color: white; width: 100%; margin-bottom: 1rem; }
        .quality-slider { margin: 1rem 0; }
        .quality-slider label { display: block; margin-bottom: 0.5rem; }
        input[type="range"] { width: 100%; accent-color: #10b981; }
        button { background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; font-weight: 600; padding: 12px 28px; border-radius: 40px; cursor: pointer; margin-top: 1rem; }
        .preview { margin-top: 1rem; text-align: center; }
        .preview img { max-width: 100%; border-radius: 1rem; margin-top: 1rem; }
        .result { margin-top: 1rem; text-align: center; padding: 1rem; background: rgba(16,185,129,0.2); border-radius: 1rem; display: none; }
        .footer { text-align: center; margin-top: 3rem; padding: 2rem; border-top: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        @media (max-width: 768px) { .container { padding: 1rem; } .nav-links a { margin-left: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-file-pdf"></i>
                <span>Master PDF Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="text-to-pdf.html">Text to PDF</a>
                <a href="image-to-pdf.html">Image to PDF</a>
                <a href="merge-pdf.html">Merge PDF</a>
                <a href="compress-pdf.html">Compress PDF</a>
                <a href="image-compressor.html">Image Compressor</a>
            </div>
        </div>

        <div class="card">
            <h1><i class="fas fa-compress"></i> Image Compressor</h1>
            <p>Reduce image size while maintaining quality. Free and secure.</p>
            
            <div class="tool-area">
                <input type="file" id="imageInput" accept="image/jpeg,image/png,image/jpg">
                <div class="quality-slider">
                    <label>Quality: <span id="qualityValue">70</span>%</label>
                    <input type="range" id="quality" min="10" max="100" value="70">
                    <p style="font-size: 0.8rem;">Lower quality = smaller file size</p>
                </div>
                <button id="compressBtn"><i class="fas fa-compress-alt"></i> Compress Image</button>
                <div id="result" class="result"></div>
                <div id="preview" class="preview"></div>
            </div>
        </div>

        <div class="footer">
            <p>©️ 2025 Master PDF Hub — Free PDF & Image Tools</p>
        </div>
    </div>

    <script>
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        qualitySlider.addEventListener('input', function() {
            qualityValue.innerText = this.value;
        });

        document.getElementById('compressBtn').addEventListener('click', function() {
            const file = document.getElementById('imageInput').files[0];
            const quality = document.getElementById('quality').value / 100;
            
            if (!file) {
                alert('Please select an image first');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        const originalSize = (file.size / 1024).toFixed(2);
                        const compressedSize = (blob.size / 1024).toFixed(2);
                        const saved = (originalSize - compressedSize).toFixed(2);
                        const savedPercent = ((1 - blob.size / file.size) * 100).toFixed(1);
                        
                        const resultDiv = document.getElementById('result');
                        const previewDiv = document.getElementById('preview');
                        
                        resultDiv.style.display = 'block';
                        resultDiv.innerHTML = `
                            <p>📊 Original: ${originalSize} KB | Compressed: ${compressedSize} KB</p>
                            <p>📉 Saved: ${saved} KB (${savedPercent}%)</p>
                            <a href="${url}" download="compressed_${file.name}" class="btn" style="display: inline-block; text-decoration: none; margin-top: 0.5rem;"><i class="fas fa-download"></i> Download Compressed Image</a>
                        `;
                        previewDiv.innerHTML = `<img src="${url}" alt="Preview">`;
                    }, file.type, quality);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
